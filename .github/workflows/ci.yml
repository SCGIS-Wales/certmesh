name: CI/CD Pipeline

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ---------- Lint ----------

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

  # ---------- Test ----------

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=certmesh --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ---------- Build ----------

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ---------- Docker Build ----------

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t certmesh:ci-test .
      - name: Smoke test container
        run: |
          docker run --rm --entrypoint python3 certmesh:ci-test -c "import certmesh; print(certmesh.__version__)"

  # ---------- Integration Tests ----------

  integration-vault-pki:
    name: Integration - Vault PKI
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --cap-add=IPC_LOCK
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Wait for Vault to be ready
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8200/v1/sys/health > /dev/null 2>&1; then
              echo "✓ Vault dev server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Vault dev server failed to become ready after 60 seconds"
              exit 1
            fi
            echo "Waiting for Vault ($i/30)..."
            sleep 2
          done
      - name: Run Vault PKI integration tests
        run: |
          set -e
          pytest -m integration tests/integration/test_vault_pki.py -v --tb=long
          echo "✓ All Vault PKI integration tests passed"
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: root

  integration-venafi-vcert:
    name: Integration - Venafi (VCert)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          set -e
          pip install -e ".[dev,integration]"
          python -c "import vcert; print('vcert imported successfully')"
      - name: Run Venafi VCert integration tests
        run: |
          set -e
          pytest -m integration tests/integration/test_venafi_vcert.py -v --tb=long
          echo "✓ All Venafi VCert integration tests passed"

  integration-acm-localstack:
    name: Integration - ACM (LocalStack)
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: acm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Wait for LocalStack
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"acm"'; then
              echo "✓ LocalStack ACM service is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: LocalStack ACM failed to become ready after 60 seconds"
              curl -s http://localhost:4566/_localstack/health || echo "Health endpoint unreachable"
              exit 1
            fi
            echo "Waiting for LocalStack ($i/30)..."
            sleep 2
          done
      - name: Run ACM LocalStack integration tests
        run: |
          set -e
          pytest -m integration tests/integration/test_acm_localstack.py -v --tb=long
          echo "✓ All ACM LocalStack integration tests passed"
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          LOCALSTACK_ENDPOINT: http://localhost:4566

  integration-helm-k3d:
    name: Integration - Helm + k3d
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: certmesh-ci
          k3d-version: v5.8.3
          args: >-
            --image rancher/k3s:v1.34.5-k3s1
            --wait
      - name: Verify Kubernetes version
        run: |
          set -e
          K8S_VERSION=$(kubectl version -o json | jq -r '.serverVersion.gitVersion')
          echo "Kubernetes version: ${K8S_VERSION}"
          # Ensure k8s version >= 1.34
          MINOR=$(echo "${K8S_VERSION}" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
          if [ "${MINOR}" -lt 34 ]; then
            echo "ERROR: Kubernetes version ${K8S_VERSION} is below required v1.34.0"
            exit 1
          fi
          echo "✓ Kubernetes version ${K8S_VERSION} meets requirement (>=1.34.0)"
      - name: Install Vault in dev mode
        run: |
          set -e
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
          helm install vault hashicorp/vault \
            --set "server.dev.enabled=true" \
            --set "server.dev.devRootToken=root" \
            --wait --timeout=120s
          kubectl wait --for=condition=ready pod/vault-0 --timeout=120s
          echo "✓ Vault dev server is ready"
      - name: Configure Vault PKI
        run: |
          set -e
          kubectl exec vault-0 -- vault secrets enable -path=pki pki
          kubectl exec vault-0 -- vault write pki/root/generate/internal \
            common_name="Test Root CA" ttl=87600h
          kubectl exec vault-0 -- vault secrets enable -path=pki_int pki
          # Generate intermediate CSR — run jq on runner, not inside the pod
          kubectl exec vault-0 -- vault write -format=json \
            pki_int/intermediate/generate/internal \
            common_name="Test Intermediate CA" | jq -r ".data.csr" > /tmp/int.csr
          kubectl cp /tmp/int.csr vault-0:/tmp/int.csr
          # Sign intermediate with root — run jq on runner
          kubectl exec vault-0 -- vault write -format=json \
            pki/root/sign-intermediate csr=@/tmp/int.csr ttl=43800h \
            | jq -r ".data.certificate" > /tmp/int.crt
          kubectl cp /tmp/int.crt vault-0:/tmp/int.crt
          kubectl exec vault-0 -- vault write pki_int/intermediate/set-signed certificate=@/tmp/int.crt
          kubectl exec vault-0 -- vault write pki_int/roles/certmesh-server \
            allowed_domains="internal.example.com" allow_subdomains=true max_ttl="720h"
          echo "✓ Vault PKI engines configured (root + intermediate + role)"
      - name: Build and import certmesh image
        run: |
          set -e
          docker build -t certmesh:ci-k3d .
          k3d image import certmesh:ci-k3d -c certmesh-ci
          echo "✓ certmesh image built and imported into k3d"
      - name: Deploy certmesh with Vault PKI TLS
        run: |
          set -e
          helm install certmesh ./helm/certmesh \
            --set image.repository=certmesh \
            --set image.tag=ci-k3d \
            --set image.pullPolicy=Never \
            --set replicaCount=1 \
            --set autoscaling.enabled=false \
            --set oauth2.enabled=false \
            --set vault.enabled=false \
            --set acm.enabled=false \
            --set vaultPkiTls.enabled=true \
            --set vaultPkiTls.mountPoint=pki_int \
            --set vaultPkiTls.roleName=certmesh-server \
            --set vaultPkiTls.commonName=certmesh.internal.example.com \
            --set vaultPkiTls.fetchCaChain=true \
            --set vaultPkiTls.intermediateMountPoint=pki_int \
            --set vaultPkiTls.rootMountPoint=pki \
            --set vault.url=http://vault:8200 \
            --set vault.authMethod=kubernetes \
            --timeout=180s
          echo "✓ Helm install succeeded"
      - name: Validate deployment is running
        run: |
          set -e
          echo "--- Waiting for pod to be scheduled ---"
          kubectl wait --for=condition=PodScheduled pod -l app.kubernetes.io/name=certmesh --timeout=60s

          echo "--- Pod status ---"
          kubectl get pods -l app.kubernetes.io/name=certmesh -o wide

          echo "--- Init container logs ---"
          # Wait briefly for init container to start
          sleep 5
          INIT_LOGS=$(kubectl logs -l app.kubernetes.io/name=certmesh -c vault-tls-init --tail=100 2>&1) || true
          echo "${INIT_LOGS}"

          # Validate init container produced expected log output
          if echo "${INIT_LOGS}" | grep -q "vault-tls-init"; then
            echo "✓ Init container vault-tls-init produced log output"
          else
            echo "WARNING: Init container logs may not contain expected output"
          fi

          echo "--- Describe pods for debugging ---"
          kubectl describe pods -l app.kubernetes.io/name=certmesh

          # Check that no pods are in CrashLoopBackOff or Error state
          FAILED_PODS=$(kubectl get pods -l app.kubernetes.io/name=certmesh \
            -o jsonpath='{.items[*].status.containerStatuses[*].state.waiting.reason}' 2>/dev/null || echo "")
          if echo "${FAILED_PODS}" | grep -qE "CrashLoopBackOff|ErrImagePull|ImagePullBackOff"; then
            echo "ERROR: Pod is in a failed state: ${FAILED_PODS}"
            exit 1
          fi
          echo "✓ No pods in CrashLoopBackOff or image pull error state"

  # ---------- Changelog script test ----------

  changelog-script-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run changelog script tests
        run: pytest -v scripts/test_update_changelog.py

  # ---------- Auto-tag on merge to main ----------

  auto-tag:
    name: Auto-tag release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, build, changelog-script-test, integration-vault-pki, integration-venafi-vcert, integration-acm-localstack]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.create_tag.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="3.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3 | cut -d- -f1)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT} (tag: v${NEXT})"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and create tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Update pyproject.toml version
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

          # Update __init__.py version
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" src/certmesh/__init__.py

          # Commit the version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/certmesh/__init__.py
          if git diff --cached --quiet; then
            echo "Version files already up to date"
          else
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin main
          fi

          # Create and push tag
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Created tag $TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  # ---------- GitHub Release ----------

  github-release:
    name: GitHub Release
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Delete existing draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          gh api "repos/${{ github.repository }}/releases" --jq \
            ".[] | select(.tag_name==\"${TAG}\" and .draft==true) | .id" \
          | while read -r DRAFT_ID; do
            echo "Deleting draft release (id=${DRAFT_ID})..."
            gh api -X DELETE "repos/${{ github.repository }}/releases/${DRAFT_ID}"
          done

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, updating..."
            gh release edit "${TAG}" --latest
            gh release upload "${TAG}" --clobber dist/*
          else
            echo "Creating new release ${TAG}..."
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --latest \
              dist/*
          fi

  # ---------- Publish Container to GHCR ----------

  publish-container:
    name: Publish Container
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.auto-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Publish to PyPI ----------

  publish-pypi:
    name: Publish to PyPI
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, build]
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/project/certmesh/
    permissions:
      id-token: write
    steps:
      - name: Checkout source (for sdist build with updated version)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build

      - name: Verify packages
        run: twine check dist/*

      - name: List packages to publish
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ---------- Update CHANGELOG ----------

  update-changelog:
    name: Update CHANGELOG
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_changelog.py \
            "${{ needs.auto-tag.outputs.version }}" \
            "${{ github.repository }}"

      - name: Commit and push CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit"
          else
            git commit -m "docs: update CHANGELOG for v${{ needs.auto-tag.outputs.version }} [skip ci]"
            git push origin main
          fi
