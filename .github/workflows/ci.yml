name: CI/CD Pipeline

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Force Node.js 24 for all GitHub Actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------- Lint ----------

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

  # ---------- Test ----------

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=certmesh --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ---------- Build ----------

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ---------- Docker Build ----------

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t certmesh:ci-test .
      - name: Smoke test container
        run: |
          docker run --rm --entrypoint python3 certmesh:ci-test -c "import certmesh; print(certmesh.__version__)"

  # ---------- Integration Tests ----------

  integration-vault-pki:
    name: Integration - Vault PKI
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      vault:
        image: hashicorp/vault:1.21
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --cap-add=IPC_LOCK
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Wait for Vault to be ready
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8200/v1/sys/health > /dev/null 2>&1; then
              echo "✓ Vault dev server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Vault dev server failed to become ready after 60 seconds"
              exit 1
            fi
            echo "Waiting for Vault ($i/30)..."
            sleep 2
          done
      - name: Run Vault PKI integration tests
        run: |
          set -e
          pytest -m integration tests/integration/test_vault_pki.py -v --tb=long
          echo "✓ All Vault PKI integration tests passed"
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: root

  integration-venafi-vcert:
    name: Integration - Venafi (VCert)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          set -e
          pip install -e ".[dev,integration]"
          python -c "import vcert; print('vcert imported successfully')"
      - name: Run Venafi VCert integration tests
        run: |
          set -e
          pytest -m integration tests/integration/test_venafi_vcert.py -v --tb=long
          echo "✓ All Venafi VCert integration tests passed"

  integration-acm-localstack:
    name: Integration - ACM (LocalStack)
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: acm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Wait for LocalStack
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"acm"'; then
              echo "✓ LocalStack ACM service is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: LocalStack ACM failed to become ready after 60 seconds"
              curl -s http://localhost:4566/_localstack/health || echo "Health endpoint unreachable"
              exit 1
            fi
            echo "Waiting for LocalStack ($i/30)..."
            sleep 2
          done
      - name: Run ACM LocalStack integration tests
        run: |
          set -e
          pytest -m integration tests/integration/test_acm_localstack.py -v --tb=long
          echo "✓ All ACM LocalStack integration tests passed"
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          LOCALSTACK_ENDPOINT: http://localhost:4566

  integration-helm-kind:
    name: Integration - Helm + kind
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Create kind cluster (Kubernetes v1.34)
        uses: helm/kind-action@v1
        with:
          cluster_name: certmesh-ci
          node_image: kindest/node:v1.34.3
          wait: 60s
      - name: Verify Kubernetes version
        run: |
          set -e
          K8S_VERSION=$(kubectl version -o json | jq -r '.serverVersion.gitVersion')
          echo "Kubernetes version: ${K8S_VERSION}"
          MINOR=$(echo "${K8S_VERSION}" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
          if [ "${MINOR}" -lt 34 ]; then
            echo "ERROR: Kubernetes version ${K8S_VERSION} is below required v1.34.0"
            exit 1
          fi
          echo "✓ Kubernetes version ${K8S_VERSION} meets requirement (>=1.34.0)"
      - name: Install Vault in dev mode
        run: |
          set -e
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
          helm install vault hashicorp/vault \
            --set "server.dev.enabled=true" \
            --set "server.dev.devRootToken=root" \
            --wait --timeout=120s
          kubectl wait --for=condition=ready pod/vault-0 --timeout=120s
          echo "✓ Vault dev server is ready"
      - name: Configure Vault PKI
        run: |
          set -e
          # --- PKI engines ---
          kubectl exec vault-0 -- vault secrets enable -path=pki pki
          kubectl exec vault-0 -- vault write pki/root/generate/internal \
            common_name="Test Root CA" ttl=87600h
          kubectl exec vault-0 -- vault secrets enable -path=pki_int pki
          # Generate intermediate CSR — run jq on runner, not inside the pod
          kubectl exec vault-0 -- vault write -format=json \
            pki_int/intermediate/generate/internal \
            common_name="Test Intermediate CA" | jq -r ".data.csr" > /tmp/int.csr
          kubectl cp /tmp/int.csr vault-0:/tmp/int.csr
          # Sign intermediate with root — run jq on runner
          kubectl exec vault-0 -- vault write -format=json \
            pki/root/sign-intermediate csr=@/tmp/int.csr ttl=43800h \
            | jq -r ".data.certificate" > /tmp/int.crt
          kubectl cp /tmp/int.crt vault-0:/tmp/int.crt
          kubectl exec vault-0 -- vault write pki_int/intermediate/set-signed certificate=@/tmp/int.crt
          kubectl exec vault-0 -- vault write pki_int/roles/certmesh-server \
            allowed_domains="internal.example.com" allow_subdomains=true max_ttl="720h"
          echo "✓ Vault PKI engines configured (root + intermediate + role)"

          # --- Kubernetes auth method ---
          kubectl exec vault-0 -- vault auth enable kubernetes

          # Configure Kubernetes auth from INSIDE the Vault pod so it uses the
          # pod's own service account token and CA cert for token review.
          kubectl exec vault-0 -- sh -c 'vault write auth/kubernetes/config \
            kubernetes_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"'

          # Policy granting access to PKI engines + KV secrets
          kubectl exec vault-0 -- sh -c 'vault policy write certmesh-pki - <<POLICY
          path "pki_int/issue/certmesh-server" {
            capabilities = ["create", "update"]
          }
          path "pki_int/cert/ca" {
            capabilities = ["read"]
          }
          path "pki/cert/ca" {
            capabilities = ["read"]
          }
          path "secret/*" {
            capabilities = ["create", "read", "update", "list"]
          }
          POLICY'

          # Enable KV v2 engine for main container
          kubectl exec vault-0 -- vault secrets enable -path=secret -version=2 kv || true

          # Bind the certmesh ServiceAccount to the policy
          kubectl exec vault-0 -- vault write auth/kubernetes/role/certmesh \
            bound_service_account_names=certmesh \
            bound_service_account_namespaces=certmesh \
            policies=certmesh-pki \
            ttl=1h
          echo "✓ Vault Kubernetes auth configured (role=certmesh, ns=certmesh)"
      - name: Build and load certmesh image into kind
        run: |
          set -e
          docker build -t certmesh:ci-kind .
          kind load docker-image certmesh:ci-kind --name certmesh-ci
          echo "✓ certmesh image built and loaded into kind"
      - name: Deploy certmesh with Vault PKI TLS
        run: |
          set -e
          kubectl create namespace certmesh || true
          helm install certmesh ./helm/certmesh \
            --namespace certmesh \
            --set image.repository=certmesh \
            --set image.tag=ci-kind \
            --set image.pullPolicy=Never \
            --set replicaCount=1 \
            --set autoscaling.enabled=false \
            --set oauth2.enabled=false \
            --set vault.enabled=true \
            --set vault.url=http://vault.default.svc.cluster.local:8200 \
            --set vault.authMethod=kubernetes \
            --set vault.kvVersion=2 \
            --set acm.enabled=false \
            --set digicert.enabled=false \
            --set vaultPkiTls.enabled=true \
            --set vaultPkiTls.vaultImage=hashicorp/vault:1.21 \
            --set vaultPkiTls.mountPoint=pki_int \
            --set vaultPkiTls.roleName=certmesh-server \
            --set vaultPkiTls.commonName=certmesh.internal.example.com \
            --set vaultPkiTls.fetchCaChain=true \
            --set vaultPkiTls.intermediateMountPoint=pki_int \
            --set vaultPkiTls.rootMountPoint=pki \
            --set metrics.serviceMonitor.enabled=false \
            --set api.workers=2 \
            --timeout=180s
          echo "✓ Helm install succeeded"
      - name: Validate deployment is running
        run: |
          set -e
          ERRORS=0

          echo "=== Step 1: Waiting for pod to exist ==="
          for i in $(seq 1 12); do
            POD_COUNT=$(kubectl get pods -n certmesh -l app.kubernetes.io/name=certmesh \
              --no-headers 2>/dev/null | wc -l)
            if [ "${POD_COUNT}" -gt 0 ]; then
              echo "✓ Pod exists"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "FATAL: No pod created after 60 seconds"
              kubectl get all -n certmesh
              exit 1
            fi
            echo "Waiting for pod ($i/12)..."
            sleep 5
          done

          echo ""
          echo "=== Step 2: Pod status ==="
          kubectl get pods -n certmesh -o wide

          # Check for image pull errors (fatal)
          PULL_STATUS=$(kubectl get pods -l app.kubernetes.io/name=certmesh -n certmesh \
            -o jsonpath='{.items[*].status.initContainerStatuses[*].state.waiting.reason}' 2>/dev/null || echo "")
          if echo "${PULL_STATUS}" | grep -qE "ErrImagePull|ImagePullBackOff"; then
            echo "FATAL: Image pull failed: ${PULL_STATUS}"
            exit 1
          fi
          echo "✓ No image pull errors"

          echo ""
          echo "=== Step 3: Waiting for init container to complete ==="
          # Wait up to 90 seconds for the init container to finish
          for i in $(seq 1 18); do
            INIT_STATUS=$(kubectl get pods -l app.kubernetes.io/name=certmesh -n certmesh \
              -o jsonpath='{.items[0].status.initContainerStatuses[0].state}' 2>/dev/null || echo "")
            if echo "${INIT_STATUS}" | grep -q "terminated"; then
              echo "✓ Init container completed"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "WARNING: Init container still running after 90s — collecting logs anyway"
            fi
            sleep 5
          done

          echo ""
          echo "=== Step 4: Init container logs ==="
          INIT_LOGS=$(kubectl logs -l app.kubernetes.io/name=certmesh -n certmesh \
            -c vault-tls-init --tail=200 2>&1) || true
          echo "${INIT_LOGS}"

          # Check init container produced log output
          if echo "${INIT_LOGS}" | grep -q "vault-tls-init"; then
            echo "✓ Init container vault-tls-init produced log output"
          else
            echo "ERROR: Init container did not produce expected log output"
            kubectl describe pods -l app.kubernetes.io/name=certmesh -n certmesh
            ERRORS=$((ERRORS + 1))
          fi

          # Check init container authenticated to Vault
          if echo "${INIT_LOGS}" | grep -q "authentication successful"; then
            echo "✓ Vault authentication successful"
          else
            echo "ERROR: Vault authentication did not succeed"
            ERRORS=$((ERRORS + 1))
          fi

          # Check for errors and warnings in init container logs
          echo ""
          echo "--- Scanning init container logs for errors ---"
          INIT_ERRORS=$(echo "${INIT_LOGS}" | grep -iE "permission denied|Error making API|Read-only file system|can't create|error|FATAL" | grep -iv "echo.*error\|#.*error" || true)
          if [ -n "${INIT_ERRORS}" ]; then
            echo "ERROR: Init container logs contain errors:"
            echo "${INIT_ERRORS}"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ No errors found in init container logs"
          fi

          # Check init container exit code
          INIT_EXIT=$(kubectl get pods -l app.kubernetes.io/name=certmesh -n certmesh \
            -o jsonpath='{.items[0].status.initContainerStatuses[0].state.terminated.exitCode}' 2>/dev/null || echo "unknown")
          if [ "${INIT_EXIT}" = "0" ]; then
            echo "✓ Init container exited with code 0"
          else
            echo "ERROR: Init container exited with code ${INIT_EXIT}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check TLS certificate was issued (leaf cert serial logged)
          if echo "${INIT_LOGS}" | grep -q "Leaf certificate issued successfully"; then
            echo "✓ Leaf TLS certificate issued successfully"
          else
            echo "ERROR: Leaf TLS certificate was not issued"
            ERRORS=$((ERRORS + 1))
          fi

          echo ""
          echo "=== Step 5: Waiting for main container to become ready ==="
          if kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=certmesh \
            -n certmesh --timeout=120s 2>/dev/null; then
            echo "✓ Main container is ready"
          else
            echo "ERROR: Main container did not become ready within 120s"
            echo "--- Main container logs ---"
            kubectl logs -l app.kubernetes.io/name=certmesh -n certmesh \
              -c certmesh --tail=50 2>&1 || true
            kubectl describe pods -l app.kubernetes.io/name=certmesh -n certmesh
            ERRORS=$((ERRORS + 1))
          fi

          echo ""
          echo "=== Step 6: Main container log inspection ==="
          MAIN_LOGS=$(kubectl logs -l app.kubernetes.io/name=certmesh -n certmesh \
            -c certmesh --tail=200 2>&1) || true
          if [ -n "${MAIN_LOGS}" ]; then
            echo "${MAIN_LOGS}" | tail -20
            # Scan for errors/warnings
            MAIN_ERRORS=$(echo "${MAIN_LOGS}" | grep -iE '"level":\s*"(error|critical|fatal)"' || true)
            if [ -n "${MAIN_ERRORS}" ]; then
              echo ""
              echo "WARNING: Main container logs contain error-level entries:"
              echo "${MAIN_ERRORS}"
            else
              echo "✓ No error-level log entries in main container"
            fi
          fi

          echo ""
          echo "=== Step 7: Final pod status ==="
          kubectl get pods -n certmesh -o wide

          echo ""
          if [ "${ERRORS}" -gt 0 ]; then
            echo "FAILED: ${ERRORS} validation error(s) detected"
            exit 1
          fi
          echo "✓ Helm deployment fully validated — init container + main container healthy"

      - name: Capacity & Performance test (in-cluster)
        timeout-minutes: 5
        run: |
          set -e
          echo "=== Capacity & Performance: Load test against live pod ==="

          # All curl commands use --max-time and --connect-timeout to prevent
          # hangs if port-forward drops or the pod becomes unresponsive.
          CURL="curl -s --connect-timeout 5 --max-time 10"

          # Get the pod IP for diagnostics
          POD_IP=$(kubectl get pods -n certmesh -l app.kubernetes.io/name=certmesh \
            -o jsonpath='{.items[0].status.podIP}')
          echo "Pod IP: ${POD_IP}"

          # Port-forward in background for testing from runner
          kubectl port-forward -n certmesh svc/certmesh 8000:8000 &
          PF_PID=$!
          # Give port-forward time to establish, verify with a probe
          sleep 3
          for attempt in 1 2 3; do
            if ${CURL} -o /dev/null http://localhost:8000/healthz 2>/dev/null; then
              echo "Port-forward established (attempt ${attempt})"
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "ERROR: Port-forward failed to establish after 3 attempts"
              kill ${PF_PID} 2>/dev/null || true
              kubectl get pods -n certmesh -o wide
              kubectl logs -l app.kubernetes.io/name=certmesh -n certmesh --tail=30 || true
              exit 1
            fi
            sleep 2
          done

          # --- Test 1: Basic reachability ---
          echo ""
          echo "--- Test 1: Health endpoint reachability ---"
          HTTP_CODE=$(${CURL} -o /dev/null -w '%{http_code}' http://localhost:8000/healthz)
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✓ /healthz returned HTTP ${HTTP_CODE}"
          else
            echo "ERROR: /healthz returned HTTP ${HTTP_CODE}"
            ${CURL} http://localhost:8000/healthz || true
            kill ${PF_PID} 2>/dev/null || true
            exit 1
          fi

          # --- Test 2: Sequential throughput ---
          echo ""
          echo "--- Test 2: Sequential throughput (50 requests) ---"
          SEQ_ERRORS=0
          START=$(date +%s%N)
          for i in $(seq 1 50); do
            CODE=$(${CURL} -o /dev/null -w '%{http_code}' http://localhost:8000/healthz || echo "000")
            if [ "${CODE}" != "200" ]; then
              SEQ_ERRORS=$((SEQ_ERRORS + 1))
            fi
          done
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          if [ "${ELAPSED_MS}" -gt 0 ]; then
            RPS=$(( 50 * 1000 / ELAPSED_MS ))
          else
            RPS=0
          fi
          echo "  50 sequential requests in ${ELAPSED_MS}ms (${RPS} req/s)"
          echo "  Errors: ${SEQ_ERRORS}/50"
          if [ "${SEQ_ERRORS}" -gt 5 ]; then
            echo "ERROR: Too many errors (${SEQ_ERRORS}/50)"
            kill ${PF_PID} 2>/dev/null || true
            exit 1
          fi
          echo "✓ Sequential throughput: ${RPS} req/s with ${SEQ_ERRORS} errors"

          # --- Test 3: Concurrent throughput ---
          echo ""
          echo "--- Test 3: Concurrent throughput (20 parallel requests) ---"
          CONC_DIR=$(mktemp -d)
          CURL_PIDS=""
          START=$(date +%s%N)
          for i in $(seq 1 20); do
            ${CURL} -o /dev/null -w '%{http_code}\n' http://localhost:8000/healthz \
              > "${CONC_DIR}/${i}.out" 2>/dev/null &
            CURL_PIDS="${CURL_PIDS} $!"
          done
          # Wait only for curl processes (NOT port-forward which runs forever)
          for pid in ${CURL_PIDS}; do
            wait "${pid}" 2>/dev/null || true
          done
          END=$(date +%s%N)
          CONC_MS=$(( (END - START) / 1000000 ))
          CONC_ERRORS=$(cat "${CONC_DIR}"/*.out | grep -cv "200" || true)
          echo "  20 concurrent requests in ${CONC_MS}ms"
          echo "  Errors: ${CONC_ERRORS}/20"
          rm -rf "${CONC_DIR}"
          echo "✓ Concurrent throughput test passed (${CONC_ERRORS} errors)"

          # --- Test 4: Readiness endpoint deep check ---
          echo ""
          echo "--- Test 4: Readiness endpoint check ---"
          READYZ=$(${CURL} http://localhost:8000/readyz || echo "error")
          echo "  /readyz response: ${READYZ}"
          READYZ_CODE=$(${CURL} -o /dev/null -w '%{http_code}' http://localhost:8000/readyz || echo "000")
          echo "  /readyz HTTP status: ${READYZ_CODE}"
          if [ "${READYZ_CODE}" = "200" ]; then
            echo "✓ Readiness probe healthy"
          else
            echo "WARNING: Readiness probe returned ${READYZ_CODE} (non-fatal)"
          fi

          # --- Test 5: Response headers check ---
          echo ""
          echo "--- Test 5: Response headers inspection ---"
          HEADERS=$(${CURL} -I http://localhost:8000/healthz || echo "")
          echo "${HEADERS}"
          if echo "${HEADERS}" | grep -qi "x-request-id"; then
            echo "✓ X-Request-ID header present"
          else
            echo "WARNING: X-Request-ID header missing"
          fi

          # --- Summary ---
          echo ""
          echo "=== Performance Summary ==="
          echo "  Sequential: ${RPS} req/s (50 requests, ${SEQ_ERRORS} errors)"
          echo "  Concurrent: 20 requests in ${CONC_MS}ms (${CONC_ERRORS} errors)"

          kill ${PF_PID} 2>/dev/null || true
          echo ""
          echo "✓ Capacity & Performance tests passed against live K8s pod"

  # ---------- Changelog script test ----------

  changelog-script-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run changelog script tests
        run: pytest -v scripts/test_update_changelog.py

  # ---------- Auto-tag on merge to main ----------

  auto-tag:
    name: Auto-tag release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, build, changelog-script-test, integration-vault-pki, integration-venafi-vcert, integration-acm-localstack, integration-helm-kind]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.create_tag.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="3.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3 | cut -d- -f1)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT} (tag: v${NEXT})"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and create tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Update pyproject.toml version
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

          # Update __init__.py version
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" src/certmesh/__init__.py

          # Update sonar-project.properties version (REL-05)
          sed -i "s/^sonar.projectVersion=.*/sonar.projectVersion=$VERSION/" sonar-project.properties

          # Update Helm chart appVersion (REL-05)
          sed -i "s/^appVersion: \".*\"/appVersion: \"$VERSION\"/" helm/certmesh/Chart.yaml

          # Commit the version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/certmesh/__init__.py sonar-project.properties helm/certmesh/Chart.yaml
          if git diff --cached --quiet; then
            echo "Version files already up to date"
          else
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin main
          fi

          # Create and push tag
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Created tag $TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  # ---------- GitHub Release ----------

  github-release:
    name: GitHub Release
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Delete existing draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          gh api "repos/${{ github.repository }}/releases" --jq \
            ".[] | select(.tag_name==\"${TAG}\" and .draft==true) | .id" \
          | while read -r DRAFT_ID; do
            echo "Deleting draft release (id=${DRAFT_ID})..."
            gh api -X DELETE "repos/${{ github.repository }}/releases/${DRAFT_ID}"
          done

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, updating..."
            gh release edit "${TAG}" --latest
            gh release upload "${TAG}" --clobber dist/*
          else
            echo "Creating new release ${TAG}..."
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --latest \
              dist/*
          fi

  # ---------- Publish Container to GHCR ----------

  publish-container:
    name: Publish Container
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.auto-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Publish to PyPI ----------

  publish-pypi:
    name: Publish to PyPI
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, build]
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/project/certmesh/
    permissions:
      id-token: write
    steps:
      - name: Checkout source (for sdist build with updated version)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build

      - name: Verify packages
        run: twine check dist/*

      - name: List packages to publish
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ---------- Update CHANGELOG ----------

  update-changelog:
    name: Update CHANGELOG
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_changelog.py \
            "${{ needs.auto-tag.outputs.version }}" \
            "${{ github.repository }}"

      - name: Commit and push CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit"
          else
            git commit -m "docs: update CHANGELOG for v${{ needs.auto-tag.outputs.version }} [skip ci]"
            git push origin main
          fi
