apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certmesh.fullname" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "certmesh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "certmesh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "certmesh.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 45
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "certmesh.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- if .Values.vaultPkiTls.enabled }}
      initContainers:
        - name: vault-tls-init
          image: hashicorp/vault:1.15
          command:
            - sh
            - -c
            - |
              vault write -format=json \
                {{ .Values.vaultPkiTls.mountPoint }}/issue/{{ .Values.vaultPkiTls.roleName }} \
                common_name={{ .Values.vaultPkiTls.commonName }} \
                ttl={{ .Values.vaultPkiTls.ttl }} \
                {{- range .Values.vaultPkiTls.sans }}
                alt_names={{ . }} \
                {{- end }}
              | tee /tmp/tls-response.json

              cat /tmp/tls-response.json | jq -r '.data.certificate' > /tls/tls.crt
              cat /tmp/tls-response.json | jq -r '.data.private_key' > /tls/tls.key
              cat /tmp/tls-response.json | jq -r '.data.issuing_ca' > /tls/ca.crt
              chmod 600 /tls/tls.key
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.url | quote }}
            {{- if eq .Values.vault.authMethod "approle" }}
            - name: VAULT_TOKEN
              value: ""  # Will authenticate via approle in entrypoint
            {{- end }}
          volumeMounts:
            - name: vault-tls
              mountPath: /tls
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "certmesh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CM_CONFIG_FILE
              value: /config/config.yaml
            - name: CM_API_WORKERS
              value: {{ .Values.api.workers | quote }}
            - name: CM_API_TIMEOUT
              value: {{ .Values.api.timeout | quote }}
            - name: CM_API_LOG_LEVEL
              value: {{ .Values.api.logLevel | quote }}
            {{- if .Values.api.corsOrigins }}
            - name: CM_API_CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | quote }}
            {{- end }}
            # OAuth2
            - name: CM_OAUTH2_ENABLED
              value: {{ .Values.oauth2.enabled | quote }}
            {{- if .Values.oauth2.enabled }}
            - name: CM_OAUTH2_ISSUER_URL
              value: {{ .Values.oauth2.issuerUrl | quote }}
            - name: CM_OAUTH2_AUDIENCE
              value: {{ .Values.oauth2.audience | quote }}
            {{- if .Values.oauth2.jwksUri }}
            - name: CM_OAUTH2_JWKS_URI
              value: {{ .Values.oauth2.jwksUri | quote }}
            {{- end }}
            - name: CM_OAUTH2_REQUIRED_SCOPES
              value: {{ .Values.oauth2.requiredScopes | quote }}
            {{- end }}
            - name: CM_OAUTH2_PROVIDER_HINT
              value: {{ .Values.oauth2.providerHint | default "generic" | quote }}
            # Vault
            {{- if .Values.vault.enabled }}
            - name: CM_VAULT_URL
              value: {{ .Values.vault.url | quote }}
            - name: CM_VAULT_AUTH_METHOD
              value: {{ .Values.vault.authMethod | quote }}
            - name: CM_VAULT_KV_VERSION
              value: {{ .Values.vault.kvVersion | quote }}
            {{- if eq .Values.vault.authMethod "approle" }}
            {{- if .Values.vault.approle.existingSecret }}
            - name: CM_VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.roleIdKey }}
            - name: CM_VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.secretIdKey }}
            {{- end }}
            {{- end }}
            {{- end }}
            # ACM
            {{- if .Values.acm.enabled }}
            - name: CM_ACM_REGION
              value: {{ .Values.acm.region | quote }}
            {{- end }}
            # Venafi
            {{- if .Values.venafi.enabled }}
            - name: CM_VENAFI_BASE_URL
              value: {{ .Values.venafi.baseUrl | quote }}
            - name: CM_VENAFI_AUTH_METHOD
              value: {{ .Values.venafi.authMethod | quote }}
            - name: CM_VENAFI_OAUTH_CLIENT_ID
              value: {{ .Values.venafi.oauthClientId | quote }}
            - name: CM_VENAFI_OAUTH_SCOPE
              value: {{ .Values.venafi.oauthScope | quote }}
            - name: CM_VENAFI_TLS_VERIFY
              value: {{ .Values.venafi.tlsVerify | quote }}
            {{- end }}
            # Let's Encrypt
            {{- if .Values.letsencrypt.enabled }}
            - name: CM_LETSENCRYPT_ENABLED
              value: "true"
            - name: CM_LETSENCRYPT_DIRECTORY_URL
              value: {{ .Values.letsencrypt.directoryUrl | quote }}
            - name: CM_LETSENCRYPT_EMAIL
              value: {{ .Values.letsencrypt.email | quote }}
            - name: CM_LETSENCRYPT_CHALLENGE_TYPE
              value: {{ .Values.letsencrypt.challengeType | quote }}
            {{- end }}
            # Vault PKI TLS
            {{- if .Values.vaultPkiTls.enabled }}
            - name: CM_API_TLS_CERT
              value: {{ .Values.vaultPkiTls.certPath | quote }}
            - name: CM_API_TLS_KEY
              value: {{ .Values.vaultPkiTls.keyPath | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.vaultPkiTls.enabled }}
            - name: vault-tls
              mountPath: /etc/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "certmesh.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "certmesh.fullname" . }}-data
        {{- end }}
        {{- if .Values.vaultPkiTls.enabled }}
        - name: vault-tls
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
