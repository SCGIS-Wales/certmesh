apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certmesh.fullname" . }}
  namespace: {{ include "certmesh.namespace" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "certmesh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "certmesh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "certmesh.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 45
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "certmesh.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- if and .Values.vaultPkiTls.enabled (ne (default "initContainer" .Values.vaultPkiTls.method) "certManager") }}
      initContainers:
        - name: vault-tls-init
          image: {{ .Values.vaultPkiTls.vaultImage | default "hashicorp/vault:1.21" }}
          command: ["sh", "/scripts/vault-tls-init.sh"]
          # K8s >= 1.34: per-container restart policy (ContainerRestartRules).
          # Never = if TLS init fails, the pod fails immediately instead of
          # retrying endlessly. This surfaces Vault auth / PKI config errors
          # quickly and avoids CrashLoopBackOff on a doomed init container.
          restartPolicy: Never
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.url | quote }}
            - name: VAULT_AUTH_METHOD
              value: {{ .Values.vault.authMethod | quote }}
            - name: PKI_MOUNT_POINT
              value: {{ .Values.vaultPkiTls.mountPoint | quote }}
            - name: PKI_ROLE_NAME
              value: {{ .Values.vaultPkiTls.roleName | quote }}
            - name: PKI_COMMON_NAME
              value: {{ .Values.vaultPkiTls.commonName | quote }}
            - name: PKI_TTL
              value: {{ .Values.vaultPkiTls.ttl | quote }}
            - name: PKI_SANS
              value: {{ join "," .Values.vaultPkiTls.sans | quote }}
            - name: FETCH_CA_CHAIN
              value: {{ .Values.vaultPkiTls.fetchCaChain | quote }}
            - name: INT_MOUNT_POINT
              value: {{ .Values.vaultPkiTls.intermediateMountPoint | quote }}
            - name: ROOT_MOUNT_POINT
              value: {{ .Values.vaultPkiTls.rootMountPoint | quote }}
            - name: TLS_DIR
              value: "/tls"
            {{- if eq .Values.vault.authMethod "approle" }}
            {{- if .Values.vault.approle.existingSecret }}
            - name: VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.roleIdKey }}
            - name: VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.secretIdKey }}
            {{- end }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: vault-tls
              mountPath: /tls
            - name: tmp
              mountPath: /tmp
            - name: init-script
              mountPath: /scripts
              readOnly: true
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "certmesh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CM_CONFIG_FILE
              value: /config/config.yaml
            # "auto" = 2 × CPU cores + 1 (gunicorn default formula).
            # Set to an integer in values.yaml to override.
            - name: CM_API_WORKERS
              value: {{ .Values.api.workers | default "auto" | quote }}
            - name: CM_API_TIMEOUT
              value: {{ .Values.api.timeout | quote }}
            - name: CM_API_LOG_LEVEL
              value: {{ .Values.api.logLevel | quote }}
            {{- if .Values.api.corsOrigins }}
            - name: CM_API_CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | quote }}
            {{- end }}
            # OAuth2
            - name: CM_OAUTH2_ENABLED
              value: {{ .Values.oauth2.enabled | quote }}
            {{- if .Values.oauth2.enabled }}
            - name: CM_OAUTH2_ISSUER_URL
              value: {{ .Values.oauth2.issuerUrl | quote }}
            - name: CM_OAUTH2_AUDIENCE
              value: {{ .Values.oauth2.audience | quote }}
            {{- if .Values.oauth2.jwksUri }}
            - name: CM_OAUTH2_JWKS_URI
              value: {{ .Values.oauth2.jwksUri | quote }}
            {{- end }}
            - name: CM_OAUTH2_REQUIRED_SCOPES
              value: {{ .Values.oauth2.requiredScopes | quote }}
            {{- end }}
            - name: CM_OAUTH2_PROVIDER_HINT
              value: {{ .Values.oauth2.providerHint | default "generic" | quote }}
            # Vault
            {{- if .Values.vault.enabled }}
            - name: CM_VAULT_URL
              value: {{ .Values.vault.url | quote }}
            - name: CM_VAULT_AUTH_METHOD
              value: {{ .Values.vault.authMethod | quote }}
            - name: CM_VAULT_KV_VERSION
              value: {{ .Values.vault.kvVersion | quote }}
            {{- if eq .Values.vault.authMethod "approle" }}
            {{- if .Values.vault.approle.existingSecret }}
            - name: CM_VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.roleIdKey }}
            - name: CM_VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.secretIdKey }}
            {{- end }}
            {{- end }}
            {{- end }}
            # ACM
            {{- if .Values.acm.enabled }}
            - name: CM_ACM_REGION
              value: {{ .Values.acm.region | quote }}
            {{- end }}
            # Venafi
            {{- if .Values.venafi.enabled }}
            - name: CM_VENAFI_BASE_URL
              value: {{ .Values.venafi.baseUrl | quote }}
            - name: CM_VENAFI_AUTH_METHOD
              value: {{ .Values.venafi.authMethod | quote }}
            - name: CM_VENAFI_OAUTH_CLIENT_ID
              value: {{ .Values.venafi.oauthClientId | quote }}
            - name: CM_VENAFI_OAUTH_SCOPE
              value: {{ .Values.venafi.oauthScope | quote }}
            - name: CM_VENAFI_TLS_VERIFY
              value: {{ .Values.venafi.tlsVerify | quote }}
            {{- end }}
            # Let's Encrypt
            {{- if .Values.letsencrypt.enabled }}
            - name: CM_LETSENCRYPT_ENABLED
              value: "true"
            - name: CM_LETSENCRYPT_DIRECTORY_URL
              value: {{ .Values.letsencrypt.directoryUrl | quote }}
            - name: CM_LETSENCRYPT_EMAIL
              value: {{ .Values.letsencrypt.email | quote }}
            - name: CM_LETSENCRYPT_CHALLENGE_TYPE
              value: {{ .Values.letsencrypt.challengeType | quote }}
            {{- end }}
            # Vault PKI TLS
            {{- if .Values.vaultPkiTls.enabled }}
            - name: CM_API_TLS_CERT
              value: {{ .Values.vaultPkiTls.certPath | quote }}
            - name: CM_API_TLS_KEY
              value: {{ .Values.vaultPkiTls.keyPath | quote }}
            {{- end }}
          # ---------------------------------------------------------------
          # Probes — designed for resilience and self-healing
          # ---------------------------------------------------------------
          #
          # Startup probe: gates liveness + readiness during slow starts.
          #   - Polls every 2s for up to 90s (45 × 2s) to accommodate
          #     Vault TLS init, gunicorn worker fork, and app startup.
          #   - 5s timeout accounts for worker startup I/O (Vault auth, etc.).
          #   - Uses /healthz (returns 200 if the process is alive).
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 45   # 45 × 2s = 90s max startup time
            successThreshold: 1
          # Liveness probe: detects hung processes and triggers restart.
          #   - Lightweight /healthz check.
          #   - 3 consecutive failures (3 × 10s = 30s) trigger a restart.
          #   - Combined with terminationGracePeriodSeconds: 45, this
          #     gives gunicorn time to drain connections before SIGKILL.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0   # startup probe gates this
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3      # 3 × 10s = 30s before restart
            successThreshold: 1
          # Readiness probe: controls traffic routing via Service endpoints.
          #   - Uses /readyz which returns 200 (healthy or degraded) or 503.
          #   - "degraded" = pod responds but a backend (Vault, AWS) is down;
          #     pod stays in endpoints because it can still serve cached data.
          #   - 3 failures (3 × 5s = 15s) removes pod from endpoints quickly,
          #     directing traffic to healthy replicas.
          #   - successThreshold: 2 prevents flapping (must pass twice to re-join).
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 0   # startup probe gates this
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3      # 3 × 5s = 15s before unready
            successThreshold: 2      # must pass 2× to re-join endpoints
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.vaultPkiTls.enabled }}
            - name: vault-tls
              mountPath: /etc/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "certmesh.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "certmesh.fullname" . }}-data
        {{- end }}
        {{- if .Values.vaultPkiTls.enabled }}
        - name: vault-tls
          {{- if eq (default "initContainer" .Values.vaultPkiTls.method) "certManager" }}
          # cert-manager provisions the TLS Secret; we just mount it
          secret:
            secretName: {{ .Values.vaultPkiTls.certManagerSecretName | default "certmesh-tls" }}
          {{- else }}
          # initContainer writes certs to this emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
          {{- end }}
        {{- end }}
        {{- if and .Values.vaultPkiTls.enabled (ne (default "initContainer" .Values.vaultPkiTls.method) "certManager") }}
        - name: init-script
          configMap:
            name: {{ include "certmesh.fullname" . }}-init-script
            defaultMode: 0555
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
