apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certmesh.fullname" . }}
  namespace: {{ include "certmesh.namespace" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "certmesh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "certmesh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "certmesh.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 45
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "certmesh.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- if and .Values.vaultPkiTls.enabled (ne (default "initContainer" .Values.vaultPkiTls.method) "certManager") }}
      initContainers:
        - name: vault-tls-init
          image: hashicorp/vault:1.15
          command:
            - sh
            - -c
            - |
              set -e
              log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] vault-tls-init: $*"; }

              log "Starting TLS certificate issuance..."

              # --- Step 1: Authenticate to Vault ---
              {{- if eq .Values.vault.authMethod "approle" }}
              log "Authenticating via AppRole..."
              export VAULT_TOKEN=$(vault write -field=token auth/approle/login \
                role_id="$VAULT_ROLE_ID" \
                secret_id="$VAULT_SECRET_ID")
              log "AppRole authentication successful."
              {{- else if eq .Values.vault.authMethod "kubernetes" }}
              log "Authenticating via Kubernetes ServiceAccount..."
              export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                role="{{ .Values.vault.kubernetes.role | default "certmesh" }}" \
                jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")
              log "Kubernetes authentication successful."
              {{- end }}

              # --- Step 2: Issue leaf certificate ---
              log "Issuing leaf certificate from {{ .Values.vaultPkiTls.mountPoint }}/issue/{{ .Values.vaultPkiTls.roleName }}..."
              log "  CN={{ .Values.vaultPkiTls.commonName }}, TTL={{ .Values.vaultPkiTls.ttl }}"
              vault write -format=json \
                {{ .Values.vaultPkiTls.mountPoint }}/issue/{{ .Values.vaultPkiTls.roleName }} \
                common_name={{ .Values.vaultPkiTls.commonName }} \
                ttl={{ .Values.vaultPkiTls.ttl }} \
                {{- range .Values.vaultPkiTls.sans }}
                alt_names={{ . }} \
                {{- end }}
              > /tmp/tls-response.json

              jq -r '.data.certificate' /tmp/tls-response.json > /tls/tls.crt
              jq -r '.data.private_key' /tmp/tls-response.json > /tls/tls.key
              SERIAL=$(jq -r '.data.serial_number' /tmp/tls-response.json)
              log "Leaf certificate issued successfully (serial=${SERIAL})."

              # --- Step 3: Build CA chain bundle ---
              {{- if .Values.vaultPkiTls.fetchCaChain }}
              log "Fetching intermediate CA from {{ .Values.vaultPkiTls.intermediateMountPoint }}/cert/ca..."
              vault read -field=certificate {{ .Values.vaultPkiTls.intermediateMountPoint }}/cert/ca > /tmp/intermediate.crt
              log "Intermediate CA fetched ($(wc -l < /tmp/intermediate.crt) lines)."

              log "Fetching root CA from {{ .Values.vaultPkiTls.rootMountPoint }}/cert/ca..."
              vault read -field=certificate {{ .Values.vaultPkiTls.rootMountPoint }}/cert/ca > /tmp/root.crt
              log "Root CA fetched ($(wc -l < /tmp/root.crt) lines)."

              cat /tmp/intermediate.crt /tmp/root.crt > /tls/ca.crt
              log "CA bundle built: intermediate ({{ .Values.vaultPkiTls.intermediateMountPoint }}) + root ({{ .Values.vaultPkiTls.rootMountPoint }})."
              {{- else }}
              log "Using issuing CA from certificate response (fetchCaChain=false)."
              jq -r '.data.issuing_ca' /tmp/tls-response.json > /tls/ca.crt
              {{- end }}

              # --- Step 4: Set permissions and cleanup ---
              chmod 600 /tls/tls.key
              chmod 644 /tls/tls.crt /tls/ca.crt
              rm -f /tmp/tls-response.json /tmp/intermediate.crt /tmp/root.crt

              log "TLS certificate files written to /tls/:"
              log "  cert: {{ .Values.vaultPkiTls.certPath }} ($(wc -l < /tls/tls.crt) lines)"
              log "  key:  {{ .Values.vaultPkiTls.keyPath }} (permissions 600)"
              log "  ca:   {{ .Values.vaultPkiTls.caPath }} ($(wc -l < /tls/ca.crt) lines)"
              log "TLS certificate issuance complete."
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.url | quote }}
            {{- if eq .Values.vault.authMethod "approle" }}
            {{- if .Values.vault.approle.existingSecret }}
            - name: VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.roleIdKey }}
            - name: VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.secretIdKey }}
            {{- end }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: vault-tls
              mountPath: /tls
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "certmesh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CM_CONFIG_FILE
              value: /config/config.yaml
            - name: CM_API_WORKERS
              value: {{ .Values.api.workers | quote }}
            - name: CM_API_TIMEOUT
              value: {{ .Values.api.timeout | quote }}
            - name: CM_API_LOG_LEVEL
              value: {{ .Values.api.logLevel | quote }}
            {{- if .Values.api.corsOrigins }}
            - name: CM_API_CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | quote }}
            {{- end }}
            # OAuth2
            - name: CM_OAUTH2_ENABLED
              value: {{ .Values.oauth2.enabled | quote }}
            {{- if .Values.oauth2.enabled }}
            - name: CM_OAUTH2_ISSUER_URL
              value: {{ .Values.oauth2.issuerUrl | quote }}
            - name: CM_OAUTH2_AUDIENCE
              value: {{ .Values.oauth2.audience | quote }}
            {{- if .Values.oauth2.jwksUri }}
            - name: CM_OAUTH2_JWKS_URI
              value: {{ .Values.oauth2.jwksUri | quote }}
            {{- end }}
            - name: CM_OAUTH2_REQUIRED_SCOPES
              value: {{ .Values.oauth2.requiredScopes | quote }}
            {{- end }}
            - name: CM_OAUTH2_PROVIDER_HINT
              value: {{ .Values.oauth2.providerHint | default "generic" | quote }}
            # Vault
            {{- if .Values.vault.enabled }}
            - name: CM_VAULT_URL
              value: {{ .Values.vault.url | quote }}
            - name: CM_VAULT_AUTH_METHOD
              value: {{ .Values.vault.authMethod | quote }}
            - name: CM_VAULT_KV_VERSION
              value: {{ .Values.vault.kvVersion | quote }}
            {{- if eq .Values.vault.authMethod "approle" }}
            {{- if .Values.vault.approle.existingSecret }}
            - name: CM_VAULT_ROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.roleIdKey }}
            - name: CM_VAULT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.approle.existingSecret }}
                  key: {{ .Values.vault.approle.secretIdKey }}
            {{- end }}
            {{- end }}
            {{- end }}
            # ACM
            {{- if .Values.acm.enabled }}
            - name: CM_ACM_REGION
              value: {{ .Values.acm.region | quote }}
            {{- end }}
            # Venafi
            {{- if .Values.venafi.enabled }}
            - name: CM_VENAFI_BASE_URL
              value: {{ .Values.venafi.baseUrl | quote }}
            - name: CM_VENAFI_AUTH_METHOD
              value: {{ .Values.venafi.authMethod | quote }}
            - name: CM_VENAFI_OAUTH_CLIENT_ID
              value: {{ .Values.venafi.oauthClientId | quote }}
            - name: CM_VENAFI_OAUTH_SCOPE
              value: {{ .Values.venafi.oauthScope | quote }}
            - name: CM_VENAFI_TLS_VERIFY
              value: {{ .Values.venafi.tlsVerify | quote }}
            {{- end }}
            # Let's Encrypt
            {{- if .Values.letsencrypt.enabled }}
            - name: CM_LETSENCRYPT_ENABLED
              value: "true"
            - name: CM_LETSENCRYPT_DIRECTORY_URL
              value: {{ .Values.letsencrypt.directoryUrl | quote }}
            - name: CM_LETSENCRYPT_EMAIL
              value: {{ .Values.letsencrypt.email | quote }}
            - name: CM_LETSENCRYPT_CHALLENGE_TYPE
              value: {{ .Values.letsencrypt.challengeType | quote }}
            {{- end }}
            # Vault PKI TLS
            {{- if .Values.vaultPkiTls.enabled }}
            - name: CM_API_TLS_CERT
              value: {{ .Values.vaultPkiTls.certPath | quote }}
            - name: CM_API_TLS_KEY
              value: {{ .Values.vaultPkiTls.keyPath | quote }}
            {{- end }}
          # Startup probe: fast polling to detect container readiness, avoids
          # liveness killing a slow-starting pod (e.g. waiting for Vault TLS).
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 30   # 30 × 2s = 60s max startup time
            successThreshold: 1
          # Liveness probe: lightweight — detects process hangs.
          # Uses /healthz which always returns 200 if the process is alive.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0   # startup probe gates this
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3      # 3 × 15s = 45s before restart
            successThreshold: 1
          # Readiness probe: elaborate — checks Vault auth and AWS connectivity.
          # /readyz returns "degraded" (still 200) when backends are unhealthy,
          # and the pod stays in the Service endpoints. Override periodSeconds
          # or failureThreshold to tune sensitivity.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 0   # startup probe gates this
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3      # 3 × 10s = 30s before unready
            successThreshold: 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.vaultPkiTls.enabled }}
            - name: vault-tls
              mountPath: /etc/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "certmesh.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "certmesh.fullname" . }}-data
        {{- end }}
        {{- if .Values.vaultPkiTls.enabled }}
        - name: vault-tls
          {{- if eq (default "initContainer" .Values.vaultPkiTls.method) "certManager" }}
          # cert-manager provisions the TLS Secret; we just mount it
          secret:
            secretName: {{ .Values.vaultPkiTls.certManagerSecretName | default "certmesh-tls" }}
          {{- else }}
          # initContainer writes certs to this emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
