apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certmesh.fullname" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "certmesh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "certmesh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "certmesh.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 45
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "certmesh.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "certmesh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CM_CONFIG_FILE
              value: /config/config.yaml
            - name: CM_API_WORKERS
              value: {{ .Values.api.workers | quote }}
            - name: CM_API_TIMEOUT
              value: {{ .Values.api.timeout | quote }}
            - name: CM_API_LOG_LEVEL
              value: {{ .Values.api.logLevel | quote }}
            {{- if .Values.api.corsOrigins }}
            - name: CM_API_CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | quote }}
            {{- end }}
            # OAuth2
            - name: CM_OAUTH2_ENABLED
              value: {{ .Values.oauth2.enabled | quote }}
            {{- if .Values.oauth2.enabled }}
            - name: CM_OAUTH2_ISSUER_URL
              value: {{ .Values.oauth2.issuerUrl | quote }}
            - name: CM_OAUTH2_AUDIENCE
              value: {{ .Values.oauth2.audience | quote }}
            {{- if .Values.oauth2.jwksUri }}
            - name: CM_OAUTH2_JWKS_URI
              value: {{ .Values.oauth2.jwksUri | quote }}
            {{- end }}
            - name: CM_OAUTH2_REQUIRED_SCOPES
              value: {{ .Values.oauth2.requiredScopes | quote }}
            {{- end }}
            # Vault
            {{- if .Values.vault.enabled }}
            - name: CM_VAULT_URL
              value: {{ .Values.vault.url | quote }}
            - name: CM_VAULT_AUTH_METHOD
              value: {{ .Values.vault.authMethod | quote }}
            - name: CM_VAULT_KV_VERSION
              value: {{ .Values.vault.kvVersion | quote }}
            {{- end }}
            # ACM
            {{- if .Values.acm.enabled }}
            - name: CM_ACM_REGION
              value: {{ .Values.acm.region | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "certmesh.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "certmesh.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
