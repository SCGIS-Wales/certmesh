{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "certmesh.fullname" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "certmesh.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the cluster (ALB/NLB, Prometheus scraper)
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS for external APIs (DigiCert, Venafi, AWS, Vault)
    - ports:
        - port: 443
          protocol: TCP
      {{- with .Values.networkPolicy.egressCIDRs }}
      to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
    # Vault (default port 8200)
    - ports:
        - port: 8200
          protocol: TCP
{{- end }}
