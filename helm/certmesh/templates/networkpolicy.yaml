{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "certmesh.fullname" . }}
  namespace: {{ include "certmesh.namespace" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "certmesh.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow same-namespace traffic on application ports
    - ports:
        {{- range .Values.networkPolicy.ingressPorts }}
        - port: {{ .port }}
          protocol: {{ .protocol | default "TCP" }}
        {{- end }}
      {{- if or .Values.networkPolicy.ingressCIDRs .Values.networkPolicy.allowedNamespaces }}
      from:
        {{- range .Values.networkPolicy.ingressCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      {{- end }}
  egress:
    # DNS resolution (kube-dns / CoreDNS)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS for external APIs (DigiCert, Venafi, AWS, Let's Encrypt, OIDC JWKS)
    - ports:
        - port: 443
          protocol: TCP
      {{- with .Values.networkPolicy.egressCIDRs }}
      to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
    # Vault (default port 8200)
    - ports:
        - port: 8200
          protocol: TCP
{{- end }}
