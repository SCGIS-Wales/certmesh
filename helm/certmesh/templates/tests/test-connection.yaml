apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "certmesh.fullname" . }}-test-connection"
  namespace: {{ include "certmesh.namespace" . }}
  labels:
    {{- include "certmesh.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "certmesh.fullname" . }}:{{ .Values.service.port }}/healthz']
  restartPolicy: Never
