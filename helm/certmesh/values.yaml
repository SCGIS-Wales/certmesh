replicaCount: 2

image:
  repository: ghcr.io/scgis-wales/certmesh
  tag: ""  # defaults to chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Organisational prefix for all resource names.
# Set to "" (default) for no prefix.
# Example: "acme-" would produce resources like "acme-certmesh"
resourcePrefix: ""

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""  # IRSA role ARN
    # Required IAM permissions for the IRSA role (combine as needed):
    #   ACM:              acm:RequestCertificate, acm:DescribeCertificate, acm:ListCertificates,
    #                     acm:DeleteCertificate, acm:RenewCertificate, acm:ExportCertificate,
    #                     acm:GetCertificate, acm:ListTagsForCertificate, acm:AddTagsToCertificate
    #   ACM-PCA:          acm-pca:IssueCertificate, acm-pca:GetCertificate, acm-pca:RevokeCertificate,
    #                     acm-pca:ListCertificateAuthorities, acm-pca:DescribeCertificateAuthority,
    #                     acm-pca:GetCertificateAuthorityCertificate
    #   Route53:          route53:ChangeResourceRecordSets, route53:ListHostedZones,
    #                     route53:GetHostedZone, route53:ListResourceRecordSets
    #   Secrets Manager:  secretsmanager:CreateSecret, secretsmanager:PutSecretValue,
    #                     secretsmanager:GetSecretValue, secretsmanager:DescribeSecret,
    #                     secretsmanager:UpdateSecret, secretsmanager:TagResource
    #   Vault IAM Auth:   sts:AssumeRole, sts:GetCallerIdentity
  name: ""

# --- OAuth2 / OIDC Configuration ---
# Scopes are OAuth2 permissions, NOT Azure AD groups.
# They are validated against the "scope" claim (Entra ID) or "scp" claim (ADFS)
# in the JWT Bearer token.
#
# Azure Entra ID setup:
#   1. Register an app in Azure Portal > App Registrations
#   2. Under "Expose an API", add scopes:
#        api://<client-id>/certmesh:read
#        api://<client-id>/certmesh:write
#        api://<client-id>/certmesh:admin
#   3. Grant admin consent for the scopes
#   4. Set issuerUrl to your tenant's v2.0 endpoint
#
# Azure Entra ID example:
#   issuerUrl: "https://login.microsoftonline.com/<tenant-id>/v2.0"
#   audience: "api://<application-client-id>"
#   providerHint: "entra_id"
#
# ADFS example:
#   issuerUrl: "https://adfs.corp.example.com/adfs"
#   audience: "<relying-party-identifier>"
#   providerHint: "adfs"
oauth2:
  enabled: true
  issuerUrl: ""
  audience: ""
  jwksUri: ""  # auto-derived from issuerUrl based on providerHint
  # Provider-specific JWKS URI derivation:
  #   generic:  {issuerUrl}/.well-known/jwks.json
  #   entra_id: {issuerUrl}/discovery/v2.0/keys
  #   adfs:     {issuerUrl}/discovery/keys
  providerHint: "generic"  # "generic" | "adfs" | "entra_id"
  requiredScopes: "certmesh:read"   # minimum scope for any API access
  adminScopes: "certmesh:admin"     # scope for admin operations (revoke, delete)
  writeScopes: "certmesh:write"     # scope for write operations (order, request)

# --- Provider Configuration ---
digicert:
  enabled: true
  apiKeySource: "vault"
  baseUrl: "https://www.digicert.com/services/v2"
  output:
    destination: "filesystem"
    basePath: "/data/tls/digicert"
    vaultPathTemplate: "secret/certmesh/tls/digicert/{order_id}"
    smSecretNameTemplate: ""
    smRegion: ""

venafi:
  enabled: false
  # Venafi TPP is hosted on-premise; set the base URL of your TPP instance
  baseUrl: ""  # e.g. "https://tpp.corp.example.com"
  authMethod: "oauth"  # "oauth" or "ldap"
  oauthClientId: "certapi"
  oauthScope: "certificate:manage"
  tlsVerify: true
  output:
    destination: "filesystem"
    basePath: "/data/tls/venafi"

acm:
  enabled: true
  region: "us-east-1"
  route53:
    enabled: true
    hostedZoneId: ""
    autoSync: true

# --- Let's Encrypt Configuration ---
letsencrypt:
  enabled: false  # disabled by default
  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
  email: ""
  challengeType: "dns-01"  # "http-01" or "dns-01"
  agreeTos: false

# --- Vault Integration ---
vault:
  enabled: true
  url: "https://vault.example.com"
  authMethod: "approle"  # "approle" | "ldap" | "aws_iam"
  kvVersion: 2
  approle:
    # Name of K8s Secret containing role_id and secret_id
    existingSecret: ""  # e.g. "vault-approle-creds"
    roleIdKey: "role_id"
    secretIdKey: "secret_id"
  ldap:
    existingSecret: ""
    usernameKey: "username"
    passwordKey: "password"
  awsIam:
    role: "certmesh"
    mountPoint: "aws"
  tls:
    verify: true
  kubernetes:
    role: "certmesh"  # Vault Kubernetes auth role

# --- AWS Secrets Manager ---
secretsManager:
  enabled: false
  region: "us-east-1"

# --- API Server ---
api:
  workers: 4
  timeout: 120
  maxRequestSize: "1048576"  # 1MB
  corsOrigins: ""
  logLevel: "info"

# --- Horizontal Pod Autoscaling ---
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80
  requestRate:
    enabled: false
    targetRequestsPerSecond: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --- Observability ---
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    namespace: ""
  certExpiryMonitoring:
    enabled: true
    intervalMinutes: 60
    warningDaysThreshold: 30
    criticalDaysThreshold: 7

# --- Networking ---
service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""  # "nginx", "traefik", "alb", or any ingress controller class
  annotations: {}
    # --- NGINX Ingress Controller ---
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"  # if vaultPkiTls enabled
    #
    # --- Traefik Ingress Controller ---
    # traefik.ingress.kubernetes.io/router.tls: "true"
    # traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    #
    # --- AWS ALB Ingress Controller ---
    # alb.ingress.kubernetes.io/scheme: "internal"
    # alb.ingress.kubernetes.io/target-type: "ip"
    # alb.ingress.kubernetes.io/certificate-arn: "<acm-certificate-arn>"
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    #
    # Note: AWS NLB is typically configured at the Service level (service.annotations),
    # not on an Ingress resource.
  hosts:
    - host: certmesh.internal.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: certmesh-tls
    #   hosts:
    #     - certmesh.internal.example.com

networkPolicy:
  enabled: true
  # Allowed egress destinations
  egressCIDRs:
    - "0.0.0.0/0"  # Override with specific CIDRs in production

# --- Vault PKI TLS Auto-Issuance ---
# When enabled, an init container runs before the main certmesh container to:
#   1. Authenticate to Vault (AppRole, Kubernetes, or AWS IAM)
#   2. Issue a leaf TLS certificate from the intermediate PKI engine
#   3. Fetch the intermediate CA cert from the intermediate PKI engine
#   4. Fetch the root CA cert from the root PKI engine
#   5. Build a full CA bundle (intermediate + root) for TLS verification
#   6. Write cert, key, and CA bundle to a shared emptyDir volume
#
# Prerequisites:
#   - Vault PKI engines mounted (e.g. pki/ for root, pki_int/ for intermediate)
#   - A role configured on the issuing PKI engine allowing the CN and SANs
#   - Vault auth method granting access to the PKI engines
#
# Example Vault PKI setup:
#   # Root CA
#   vault secrets enable -path=pki pki
#   vault write pki/root/generate/internal common_name="Example Root CA" ttl=87600h
#
#   # Intermediate CA
#   vault secrets enable -path=pki_int pki
#   vault write -format=json pki_int/intermediate/generate/internal \
#     common_name="Example Intermediate CA" | jq -r '.data.csr' > int.csr
#   vault write -format=json pki/root/sign-intermediate csr=@int.csr ttl=43800h \
#     | jq -r '.data.certificate' > int.crt
#   vault write pki_int/intermediate/set-signed certificate=@int.crt
#
#   # Role for certmesh server certs
#   vault write pki_int/roles/certmesh-server \
#     allowed_domains="internal.example.com" allow_subdomains=true max_ttl="720h"
vaultPkiTls:
  enabled: false
  certType: "leaf"               # "leaf" = server certificate
  # --- Issuing PKI engine (issues the leaf cert) ---
  mountPoint: "pki_int"          # Vault PKI mount for issuing certs (typically intermediate)
  roleName: "certmesh-server"    # Role name on the issuing PKI engine
  commonName: "certmesh.internal.example.com"
  sans: []                       # e.g. ["certmesh-0.internal.example.com"]
  ttl: "720h"                    # 30 days
  # --- CA chain: intermediate + root ---
  # The init container fetches CA certs from these PKI engines and
  # concatenates them into a single ca-bundle.crt (intermediate first, root last).
  intermediateMountPoint: "pki_int"  # PKI mount that has the intermediate CA cert
  rootMountPoint: "pki"              # PKI mount that has the root CA cert
  fetchCaChain: true                 # Set to false to use only the issuing_ca from the cert response
  # --- Mount paths inside the container ---
  certPath: "/etc/tls/tls.crt"
  keyPath: "/etc/tls/tls.key"
  caPath: "/etc/tls/ca.crt"      # full CA bundle (intermediate + root)

# --- Certificate Auto-Renewal ---
# When enabled, a Kubernetes CronJob periodically checks certificates
# across all configured providers and renews those approaching expiry.
certRenewal:
  enabled: false
  # Cron schedule for renewal checks (default: daily at 2 AM UTC)
  schedule: "0 2 * * *"
  # Renew certificates expiring within this many units of time
  beforeExpiry: 30
  # Time unit: "year" | "month" | "day" | "hour"
  unit: "day"
  # Provider to check: "all" | "vault-pki" | "acm" | "digicert" | "venafi" | "letsencrypt"
  provider: "all"

# --- Persistence (for filesystem output) ---
persistence:
  enabled: false
  storageClass: "gp3"
  size: 1Gi
  mountPath: "/data/tls"

# --- Pod Configuration ---
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}  # populated by _helpers.tpl

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
